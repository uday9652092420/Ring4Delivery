<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants - Ring4Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-warning">🍔 Ring4Delivery</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="restaurants.html">Restaurants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            Cart <span class="badge bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Search & Filter Section -->
    <section class="py-4 bg-light border-bottom">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <input type="text" class="form-control form-control-lg" id="searchInput" placeholder="Search restaurants...">
                </div>
                <div class="col-md-4">
                    <select class="form-select form-select-lg" id="cuisineFilter">
                        <option value="">All Cuisines</option>
                        <option value="Italian">Italian</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Indian">Indian</option>
                        <option value="American">American</option>
                        <option value="Mexican">Mexican</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Restaurants Grid -->
    <section class="py-5">
        <div class="container">
            <h2 class="mb-4">Featured Restaurants</h2>
            <div class="row" id="restaurantsContainer">
                <!-- Restaurant cards will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 Ring4Delivery. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Load restaurants on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadRestaurants();
            updateCartCount();
            setupSearch();
        });

        function loadRestaurants() {
            const container = document.getElementById('restaurantsContainer');
            container.innerHTML = '';

            restaurants.forEach(restaurant => {
                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card restaurant-card h-100 shadow-sm hover-effect">
                            <img src="${restaurant.image}" class="card-img-top" alt="${restaurant.name}" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title">${restaurant.name}</h5>
                                <p class="card-text text-muted">${restaurant.cuisine}</p>
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="badge bg-success">⭐ ${restaurant.rating}</span>
                                    <span class="text-muted small">${restaurant.deliveryTime}</span>
                                </div>
                                <p class="card-text"><small class="text-muted">${restaurant.address}</small></p>
                                <a href="menu.html?restaurant=${restaurant.id}" class="btn btn-warning w-100 fw-bold">
                                    View Menu
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const cuisineFilter = document.getElementById('cuisineFilter');

            searchInput.addEventListener('input', filterRestaurants);
            cuisineFilter.addEventListener('change', filterRestaurants);
        }

        function filterRestaurants() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCuisine = document.getElementById('cuisineFilter').value;
            const container = document.getElementById('restaurantsContainer');
            container.innerHTML = '';

            const filtered = restaurants.filter(restaurant => {
                const matchesSearch = restaurant.name.toLowerCase().includes(searchTerm);
                const matchesCuisine = selectedCuisine === '' || restaurant.cuisine === selectedCuisine;
                return matchesSearch && matchesCuisine;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-center text-muted">No restaurants found.</p></div>';
                return;
            }

            filtered.forEach(restaurant => {
                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card restaurant-card h-100 shadow-sm hover-effect">
                            <img src="${restaurant.image}" class="card-img-top" alt="${restaurant.name}" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title">${restaurant.name}</h5>
                                <p class="card-text text-muted">${restaurant.cuisine}</p>
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="badge bg-success">⭐ ${restaurant.rating}</span>
                                    <span class="text-muted small">${restaurant.deliveryTime}</span>
                                </div>
                                <p class="card-text"><small class="text-muted">${restaurant.address}</small></p>
                                <a href="menu.html?restaurant=${restaurant.id}" class="btn btn-warning w-100 fw-bold">
                                    View Menu
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }
    </script>
</body>
</html>
