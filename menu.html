<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Ring4Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-warning">🍔 Ring4Delivery</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="restaurants.html">Restaurants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            Cart <span class="badge bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Restaurant Info -->
    <section class="py-4 bg-light border-bottom">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <img id="restaurantImage" src="" alt="Restaurant" class="img-fluid rounded" style="max-height: 150px; object-fit: cover; width: 100%;">
                </div>
                <div class="col-md-9">
                    <h2 id="restaurantName"></h2>
                    <p id="restaurantCuisine" class="text-muted"></p>
                    <div class="d-flex gap-3">
                        <span id="restaurantRating" class="badge bg-success"></span>
                        <span id="deliveryTime" class="text-muted"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Menu Categories & Items -->
    <section class="py-5">
        <div class="container">
            <div class="row">
                <!-- Sidebar Categories -->
                <div class="col-md-3 mb-4">
                    <div class="sticky-top" style="top: 20px;">
                        <h5 class="mb-3">Categories</h5>
                        <div class="list-group" id="categoriesMenu">
                            <!-- Categories will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Menu Items -->
                <div class="col-md-9">
                    <div id="menuItemsContainer">
                        <!-- Menu items will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 Ring4Delivery. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal for adding to cart -->
    <div class="modal fade" id="addToCartModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalItemName"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img id="modalItemImage" src="" alt="" class="img-fluid mb-3" style="width: 100%; height: 200px; object-fit: cover;">
                    <p id="modalItemDescription"></p>
                    <p class="fw-bold"><span id="modalItemPrice"></span></p>
                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity:</label>
                        <input type="number" id="quantity" class="form-control" value="1" min="1">
                    </div>
                    <div id="modalSpecialInstructions" class="mb-3">
                        <label for="specialInstructions" class="form-label">Special Instructions:</label>
                        <textarea id="specialInstructions" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning fw-bold" id="confirmAddToCart">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        let currentRestaurantId = null;
        let currentItemId = null;
        const addToCartModal = new bootstrap.Modal(document.getElementById('addToCartModal'));

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            currentRestaurantId = parseInt(params.get('restaurant'));

            if (currentRestaurantId) {
                loadRestaurantMenu();
                updateCartCount();
            } else {
                window.location.href = 'restaurants.html';
            }

            document.getElementById('confirmAddToCart').addEventListener('click', function() {
                const quantity = parseInt(document.getElementById('quantity').value);
                const specialInstructions = document.getElementById('specialInstructions').value;
                
                const item = getMenuItemById(currentItemId);
                if (item) {
                    addToCart(item, quantity, specialInstructions, currentRestaurantId);
                    addToCartModal.hide();
                    updateCartCount();
                }
            });
        });

        function loadRestaurantMenu() {
            const restaurant = restaurants.find(r => r.id === currentRestaurantId);
            if (!restaurant) {
                alert('Restaurant not found');
                window.location.href = 'restaurants.html';
                return;
            }

            // Display restaurant info
            document.getElementById('restaurantName').textContent = restaurant.name;
            document.getElementById('restaurantCuisine').textContent = restaurant.cuisine;
            document.getElementById('restaurantImage').src = restaurant.image;
            document.getElementById('restaurantRating').textContent = `⭐ ${restaurant.rating}`;
            document.getElementById('deliveryTime').textContent = restaurant.deliveryTime;

            // Load categories
            loadCategories(currentRestaurantId);
        }

        function loadCategories(restaurantId) {
            const categories = getUniqueCategories(restaurantId);
            const categoriesMenu = document.getElementById('categoriesMenu');
            categoriesMenu.innerHTML = '';

            categories.forEach((category, index) => {
                const btn = document.createElement('button');
                btn.className = 'list-group-item list-group-item-action' + (index === 0 ? ' active' : '');
                btn.textContent = category;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#categoriesMenu button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    displayMenuItems(restaurantId, category);
                });
                categoriesMenu.appendChild(btn);
            });

            if (categories.length > 0) {
                displayMenuItems(restaurantId, categories[0]);
            }
        }

        function getUniqueCategories(restaurantId) {
            const restaurantMenus = menus.filter(m => m.restaurantId === restaurantId);
            const categories = [...new Set(restaurantMenus.map(m => m.category))];
            return categories;
        }

        function displayMenuItems(restaurantId, category) {
            const items = menus.filter(m => m.restaurantId === restaurantId && m.category === category);
            const container = document.getElementById('menuItemsContainer');
            container.innerHTML = '';

            const categoryHeader = document.createElement('h4');
            categoryHeader.textContent = category;
            categoryHeader.className = 'mb-4';
            container.appendChild(categoryHeader);

            const itemsRow = document.createElement('div');
            itemsRow.className = 'row';

            items.forEach(item => {
                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card menu-card h-100 shadow-sm hover-effect">
                            <img src="${item.image}" class="card-img-top" alt="${item.name}" style="height: 180px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title">${item.name}</h6>
                                <p class="card-text text-muted small">${item.description}</p>
                                <div class="mt-auto">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="h6 mb-0">₹${item.price}</span>
                                        <button class="btn btn-warning btn-sm fw-bold" onclick="openAddToCartModal(${item.id}, '${item.name}', '${item.image}', ${item.price}, '${item.description}')">
                                            Add
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                itemsRow.innerHTML += card;
            });

            container.appendChild(itemsRow);
        }

        function getMenuItemById(itemId) {
            return menus.find(m => m.id === itemId);
        }

        function openAddToCartModal(itemId, name, image, price, description) {
            currentItemId = itemId;
            document.getElementById('modalItemName').textContent = name;
            document.getElementById('modalItemImage').src = image;
            document.getElementById('modalItemPrice').textContent = `₹${price}`;
            document.getElementById('modalItemDescription').textContent = description;
            document.getElementById('quantity').value = 1;
            document.getElementById('specialInstructions').value = '';
            addToCartModal.show();
        }
    </script>
</body>
</html>
